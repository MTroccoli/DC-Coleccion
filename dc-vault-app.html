<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DC VAULT</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DC Vault">
<meta name="theme-color" content="#101010">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:       #101010;
  --surface:  #1a1a1a;
  --surface2: #232323;
  --surface3: #2c2c2c;
  --border:   #2e2e2e;
  --border2:  #3a3a3a;
  --text:     #e8e8e0;
  --muted:    #7a7a72;
  --dim:      #3e3e3a;
  --gold:     #c8a84b;
  --gold2:    #e8c870;
  --golddim:  #c8a84b22;
  --red:      #cc3333;
  --yellow:   #c8a020;
  --green:    #2a8a50;
  --purple:   #7030a0;
  --col-batman:  #7755cc;
  --col-flash:   #cc3322;
  --col-crisis:  #4477cc;
  --col-jla:     #2266bb;
  --col-salvat:  #33aa66;
  --col-ww:      #cc6622;
  --col-gl:      #226622;
  --col-titanes: #aa4488;
  --col-other:   #5a5a56;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --nav-h: 64px;
  --header-h: 260px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--safe-bot));
}

/* ── HEADER / BANNER ── */
.app-header {
  position: relative;
  height: var(--header-h);
  overflow: hidden;
  flex-shrink: 0;
}
.header-bg {
  position: absolute; inset: 0;
  background: url('icon.png') center 30% / cover no-repeat;
}
.header-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg,
      rgba(8,8,16,0.3) 0%,
      rgba(10,10,20,0.65) 45%,
      rgba(16,16,16,1) 100%),
    radial-gradient(ellipse at 75% 35%, rgba(200,168,75,0.12) 0%, transparent 60%);
}
.header-status-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: calc(var(--safe-top) + 14px);
  background: rgba(8,8,16,0.4);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-end;
  padding: 0 20px 4px;
  gap: 8px;
  z-index: 10;
}
.status-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 0.25em;
  color: var(--gold); opacity: 0.7;
  padding-top: var(--safe-top);
}
.status-sync {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 0.1em;
  color: var(--muted);
  margin-left: auto;
  padding-top: var(--safe-top);
}

.header-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 20px 16px;
  z-index: 5;
}
.header-app-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px; line-height: 0.9;
  letter-spacing: 0.04em;
  color: var(--text);
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
}
.header-app-name span { color: var(--gold); }

.stats-row {
  display: flex; gap: 0;
  margin-top: 12px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  overflow: hidden;
}
.stat-pill {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 6px 8px;
  border-right: 1px solid rgba(255,255,255,0.06);
  gap: 2px;
}
.stat-pill:last-child { border-right: none; }
.stat-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; line-height: 1;
  color: var(--gold);
  text-shadow: 0 1px 8px rgba(200,168,75,0.4);
}
.stat-l {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
}
.progress-micro {
  margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
}
.progress-track {
  flex: 1; height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
}
.progress-fill {
  height: 100%; background: var(--gold);
  border-radius: 1px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 6px rgba(200,168,75,0.5);
}
.progress-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; color: var(--gold);
  letter-spacing: 0.05em; flex-shrink: 0;
}

/* ── FILTER SCROLL ── */
.filter-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 40;
}
.filter-scroll {
  display: flex; gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  align-items: center;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-sep {
  width: 1px; height: 20px;
  background: var(--border2);
  flex-shrink: 0; margin: 0 2px;
}
.pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 20px;
  cursor: pointer; border: 1px solid var(--border2);
  background: none; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
  flex-shrink: 0;
}
.pill:active { transform: scale(0.95); }
.pill.active          { background: var(--gold);   border-color: var(--gold);   color: #111; }
.pill-missing.active  { background: #886600;       border-color: #bb9900;       color: #ffdd66; }
.pill-canon.active    { background: var(--red);    border-color: var(--red);    color: #fff; }
.pill-tiein.active    { background: var(--yellow); border-color: var(--yellow); color: #111; }
.pill-elseworlds.active{background: var(--purple); border-color: var(--purple); color: #fff; }
.pill-origen.active   { background: var(--green);  border-color: var(--green);  color: #fff; }

/* search inline */
.search-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 5px 14px;
  flex-shrink: 0; margin-left: auto;
  transition: border-color 0.2s;
}
.search-pill:focus-within { border-color: var(--gold); }
.search-pill span { color: var(--muted); font-size: 13px; }
.search-pill input {
  background: none; border: none; outline: none;
  font-family: 'Barlow', sans-serif; font-size: 12px;
  color: var(--text); width: 90px;
  transition: width 0.2s;
}
.search-pill input:focus { width: 130px; }
.search-pill input::placeholder { color: var(--dim); }

/* ── MAIN CONTENT ── */
main {
  padding: 12px 0 20px;
}

/* ── ERA SECTION ── */
.era-block { margin-bottom: 6px; }
.era-toggle {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.era-toggle:active { background: var(--surface2); }
.era-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 0.2em;
  color: var(--gold); opacity: 0.6;
  background: var(--golddim);
  border: 1px solid rgba(200,168,75,0.2);
  border-radius: 4px;
  padding: 2px 8px;
  flex-shrink: 0;
}
.era-label-wrap { flex: 1; min-width: 0; }
.era-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.06em;
  color: var(--text); line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.era-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase;
  margin-top: 1px;
}
.era-chevron {
  font-size: 14px; color: var(--muted);
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0; opacity: 0.5;
}
.era-block.collapsed .era-chevron { transform: rotate(-90deg); }

.era-body {
  overflow: hidden;
  max-height: 9999px;
  transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
}
.era-block.collapsed .era-body { max-height: 0; }

.era-reset-banner {
  margin: 0 16px 6px;
  background: linear-gradient(90deg, #cc333318, transparent);
  border-left: 3px solid var(--red);
  border-radius: 0 6px 6px 0;
  padding: 8px 14px;
  font-size: 11px; color: #cc7777;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
}

.era-desc-inline {
  font-size: 12px; font-style: italic;
  color: var(--muted); line-height: 1.5;
  padding: 0 20px 10px;
}

/* ── CARDS ── */
.card-list { display: flex; flex-direction: column; gap: 1px; padding-bottom: 4px; }

.swipe-wrap { position: relative; overflow: hidden; }
.delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 72px; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 22px;
}
.delete-confirm {
  display: none; align-items: center; justify-content: space-between;
  background: var(--red); padding: 10px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; letter-spacing: 0.06em; color: #fff;
}
.swipe-wrap.confirm-delete .delete-confirm { display: flex; }
.swipe-wrap.confirm-delete .comic-card { pointer-events: none; }
.swipe-wrap.confirm-delete .comic-card { background: #cc333315; }
.btn-confirm-del { background: #fff; color: var(--red); border: none; padding: 5px 14px; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; cursor: pointer; }
.btn-cancel-del  { background: none; border: 1px solid #ffffff55; color: #fff; padding: 5px 14px; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; cursor: pointer; }

.comic-card {
  background: var(--surface);
  display: flex; align-items: stretch;
  transition: transform 0.2s ease, background 0.15s;
  touch-action: pan-y;
  position: relative;
}
.comic-card:active { background: var(--surface2); }
.comic-card.is-read { opacity: 0.38; }

.card-color-bar { width: 3px; flex-shrink: 0; }
.card-pos {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; color: var(--dim);
  width: 40px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.card-body { flex: 1; padding: 11px 10px 11px 4px; min-width: 0; }
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.03em;
  color: var(--text); line-height: 1.1;
  margin-bottom: 5px;
}
.card-title.crossed {
  text-decoration: line-through;
  text-decoration-color: var(--dim);
  color: var(--muted);
}
.card-tags { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.char-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.lore-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.lore-canon      { background: #cc333322; color: #dd6666; border: 1px solid #cc333344; }
.lore-tiein      { background: #c8a02022; color: #c8a840; border: 1px solid #c8a02044; }
.lore-elseworlds { background: #7030a022; color: #aa66cc; border: 1px solid #7030a044; }
.lore-origen     { background: #2a8a5022; color: #44aa70; border: 1px solid #2a8a5044; }
.salvat-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 5px; border-radius: 3px;
  background: #c0501018; color: #cc8855; border: 1px solid #c0501030;
}
.card-sub {
  font-size: 10px; color: var(--dim);
  margin-top: 4px; font-style: italic;
}
.card-stars { font-size: 9px; color: var(--gold); letter-spacing: -1px; }
.stars-dim { color: var(--dim); }

.card-actions {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  padding: 10px 14px 10px 8px;
}
.dot-owned {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  cursor: pointer; transition: all 0.15s;
  display: block; flex-shrink: 0;
}
.dot-owned.yes { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px rgba(200,168,75,0.4); }

.toggle-read {
  width: 38px; height: 22px; border-radius: 11px;
  background: var(--surface3); border: 1px solid var(--border2);
  cursor: pointer; position: relative; display: block;
  transition: all 0.2s; flex-shrink: 0;
}
.toggle-read::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--dim); transition: all 0.2s;
}
.toggle-read.yes { background: #2a8a5028; border-color: var(--green); }
.toggle-read.yes::after { left: 19px; background: var(--green); }

.edit-btn {
  background: none; border: none; color: var(--dim);
  font-size: 14px; cursor: pointer; padding: 2px;
  transition: color 0.15s;
}
.edit-btn:active { color: var(--gold); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bot));
  background: rgba(16,16,16,0.96);
  backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start;
  padding-top: 8px;
  z-index: 100;
}
.nav-items {
  display: flex; width: 100%;
  padding: 0 8px;
  justify-content: space-around;
}
.nav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 6px 16px;
  cursor: pointer;
  border: none; background: none;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item:active { opacity: 0.6; }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
}
.nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(200,168,75,0.6)); }
.nav-item.active .nav-label { color: var(--gold); }

/* FAB — add button */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bot) + 16px);
  right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold);
  color: #111;
  font-size: 26px; line-height: 1;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(200,168,75,0.4), 0 2px 8px rgba(0,0,0,0.6);
  transition: all 0.2s;
  z-index: 99;
  font-family: sans-serif;
}
.fab:active { transform: scale(0.92); background: var(--gold2); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 60px 20px; }
.empty-big { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--dim); }
.empty-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

/* ── SHEET MODAL (slides from bottom) ── */
.sheet-bg {
  display: none; position: fixed; inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0);
  transition: background 0.3s;
}
.sheet-bg.open {
  display: block;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1c1c1c;
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 0 0 calc(20px + var(--safe-bot));
  max-height: 92vh;
  overflow-y: auto;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  overscroll-behavior: contain;
}
.sheet-bg.open .sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2);
  margin: 12px auto 0;
}
.sheet-header {
  display: flex; align-items: center;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.sheet-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 0.1em;
  color: var(--gold); flex: 1;
}
.sheet-close {
  background: var(--surface2); border: none;
  color: var(--muted); width: 28px; height: 28px;
  border-radius: 50%; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.sheet-body { padding: 16px 20px 0; }

/* AI row */
.ai-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 14px; }
.btn-ai {
  flex-shrink: 0;
  background: #12122a; color: var(--gold);
  border: 1px solid #334499;
  padding: 10px 14px; border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px;
  letter-spacing: 0.08em; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap; transition: all 0.2s;
}
.btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ai.loading #ai-icon { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.ai-feedback {
  background: #12122a; border: 1px solid #334499;
  border-radius: 10px; padding: 10px 14px;
  margin-bottom: 12px; font-size: 12px;
  color: #8899dd; line-height: 1.5;
}
.ai-feedback.error { background: #221010; border-color: #553333; color: #cc6666; }

/* Form grid */
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fg-full { grid-column: 1/-1; }
.fl { display: flex; flex-direction: column; gap: 5px; }
.fl label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.18em; color: var(--muted);
}
.fl input, .fl select {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 12px;
  border-radius: 10px;
  font-family: 'Barlow', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
.fl input:focus, .fl select:focus { border-color: var(--gold); }
.fl select option { background: #1c1c1c; }
.checkrow { display: flex; gap: 24px; margin-top: 4px; }
.chk {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--muted); cursor: pointer;
}
.chk input { accent-color: var(--gold); width: 16px; height: 16px; }
.sheet-footer {
  display: flex; gap: 10px;
  padding: 16px 20px 0;
}
.btn-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--muted); padding: 14px;
  border-radius: 12px; font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer;
}
.btn-save {
  flex: 2; background: var(--gold); border: none;
  color: #111; padding: 14px;
  border-radius: 12px; font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.12em; cursor: pointer;
  transition: background 0.15s;
}
.btn-save:active { background: var(--gold2); }

/* scrollbar */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="app-header">
  <div class="header-bg"></div>
  <div class="header-status-bar">
    <span class="status-title">DC VAULT</span>
    <span id="sync-status" class="status-sync">☁ —</span>
  </div>
  <div class="header-content">
    <div class="header-app-name">DC<span>VAULT</span></div>

// ── SYNC ──────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if(!el) return;
  const icons  = { idle:'☁', saving:'↑', ok:'✓', error:'✕', loading:'↓' };
  const colors = { idle:'var(--muted)', saving:'var(--gold)', ok:'var(--green)', error:'var(--red)', loading:'var(--gold)' };
  el.textContent = `${icons[state]} ${msg}`;
  el.style.color = colors[state];
  el.style.animation = (state==='saving'||state==='loading') ? 'pulse 1s infinite' : 'none';
}

async function loadState() {
  setSyncStatus('loading','Cargando…');
  try {
    const res = await fetch(SB.endpoint, { headers: SB.headers });
    if(!res.ok) throw new Error();
    const rows = await res.json();
    if(rows.length>0 && rows[0].data?.length>0) {
      comics = rows[0].data;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(comics));
      setSyncStatus('ok','Sincronizado');
    } else { comics = buildDefault(); await syncToSupabase(); }
  } catch {
    const raw = localStorage.getItem(LOCAL_KEY);
    comics = raw ? JSON.parse(raw) : buildDefault();
    setSyncStatus('error','Local');
  }
}

let saveTimer = null;
function saveState() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(comics));
  clearTimeout(saveTimer);
  setSyncStatus('saving','Guardando…');
  saveTimer = setTimeout(syncToSupabase, 1500);
}

async function syncToSupabase() {
  try {
    const res = await fetch(`${SB.url}/rest/v1/${SB.table}`, {
      method: 'POST',
      headers: { ...SB.headers, 'Prefer':'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: SB.rowId, data: comics })
    });
    if(!res.ok) throw new Error();
    setSyncStatus('ok','Sincronizado ✓');
  } catch { setSyncStatus('error','Error sync'); }
}

// ── FILTERS ───────────────────────────────────────────────────
let activeFilter='all', activeLore=null, searchQ='';
function getVisible() {
  let list = [...comics];
  if(activeFilter==='owned')   list = list.filter(c=>c.owned);
  if(activeFilter==='missing') list = list.filter(c=>!c.owned);
  if(activeFilter==='unread')  list = list.filter(c=>c.owned&&!c.read);
  if(activeLore)               list = list.filter(c=>c.lore===activeLore);
  if(searchQ){ const q=searchQ.toLowerCase(); list=list.filter(c=>c.title.toLowerCase().includes(q)||(c.arc||'').toLowerCase().includes(q)); }
  return list.sort((a,b)=>a.order-b.order);
}

// ── RENDER ────────────────────────────────────────────────────
function starsHtml(n){ n=n||3; return `<span class="card-stars">${'★'.repeat(n)}<span class="stars-dim">${'★'.repeat(5-n)}</span></span>`; }

function render() {
  updateStats();
  const list = getVisible();
  const root = document.getElementById('root');
  if(!list.length){ root.innerHTML=`<div class="empty"><div class="empty-big">—</div><div class="empty-sub">Sin resultados.</div></div>`; return; }

  const collapsed = {};
  document.querySelectorAll('.era-block.collapsed').forEach(el => { collapsed[el.dataset.era] = true; });

  const buckets = {};
  ERAS.forEach(e=>{ buckets[e.key]=[]; });
  list.forEach(c => {
    const era = ERAS.find(e=>c.order>=e.oMin&&c.order<e.oMax)||ERAS[ERAS.length-1];
    buckets[era.key].push(c);
  });

  let html='', pos=1;
  ERAS.forEach(era => {
    const items = buckets[era.key];
    if(!items.length) return;
    const isCollapsed = collapsed[era.key] !== false ? 'collapsed' : '';

    html += `<div class="era-block ${isCollapsed}" data-era="${era.key}">
      <div class="era-toggle" onclick="toggleEra('${era.key}')">
        <div class="era-badge">${era.num}</div>
        <div class="era-label-wrap">
          <div class="era-name">${era.name}</div>
          <div class="era-count">${items.length} tomo${items.length!==1?'s':''}</div>
        </div>
        <div class="era-chevron">›</div>
      </div>
      <div class="era-body">
        <div class="era-desc-inline">${era.desc}</div>
        ${era.reset?`<div class="era-reset-banner">${era.reset}</div>`:''}
        <div class="card-list">`;

    items.forEach(c => {
      const color = CHAR_COLORS[c.char||'other']||'var(--col-other)';
      html += `
        <div class="swipe-wrap" data-id="${c.id}" id="sw-${c.id}">
          <div class="delete-bg">🗑</div>
          <div class="comic-card ${c.read?'is-read':''}" data-id="${c.id}">
            <div class="card-color-bar" style="background:${color}"></div>
            <div class="card-pos">${pos++}</div>
            <div class="card-body">
              <div class="card-title ${c.read?'crossed':''}">${c.title}</div>
              <div class="card-tags">
                <span class="char-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${CHAR_LABELS[c.char||'other']||'Otro'}</span>
                <span class="lore-tag lore-${c.lore}">${LORE_LABELS[c.lore]}</span>
                ${c.salvat?`<span class="salvat-badge">#${c.salvat}</span>`:''}
                ${starsHtml(c.stars)}
              </div>
              ${c.edition||c.volume?`<div class="card-sub">${[c.edition,c.volume].filter(Boolean).join(' · ')}</div>`:''}
            </div>
            <div class="card-actions">
              <span class="dot-owned ${c.owned?'yes':''}" onclick="toggleOwned('${c.id}')"></span>
              <span class="toggle-read ${c.read?'yes':''}" onclick="toggleRead('${c.id}')"></span>
              <button class="edit-btn" onclick="openEdit('${c.id}')">✏</button>
            </div>
          </div>
          <div class="delete-confirm">
            <span>¿Eliminar?</span>
            <div style="display:flex;gap:8px">
              <button class="btn-cancel-del" onclick="cancelDelete('${c.id}')">No</button>
              <button class="btn-confirm-del" onclick="confirmDelete('${c.id}')">Sí</button>
            </div>
          </div>
        </div>`;
    });
    html += `</div></div></div>`;
  });
  root.innerHTML = html;
  initSwipe();
}

function updateStats() {
  const owned=comics.filter(c=>c.owned).length, read=comics.filter(c=>c.read).length;
  document.getElementById('s-total').textContent=comics.length;
  document.getElementById('s-owned').textContent=owned;
  document.getElementById('s-read').textContent=read;
  const pct=owned?Math.round(read/owned*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-label').textContent=pct+'%';
}

// ── ACCORDION ─────────────────────────────────────────────────
function toggleEra(key) {
  const el = document.querySelector(`.era-block[data-era="${key}"]`);
  if(el) el.classList.toggle('collapsed');
}

// ── SWIPE ─────────────────────────────────────────────────────
function initSwipe() {
  document.querySelectorAll('.swipe-wrap').forEach(wrap => {
    const card = wrap.querySelector('.comic-card');
    let startX=0, startY=0, isDragging=false, isHorizontal=null;
    card.addEventListener('touchstart', e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;isDragging=true;isHorizontal=null;},{passive:true});
    card.addEventListener('touchmove', e=>{
      if(!isDragging) return;
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(isHorizontal===null) isHorizontal=Math.abs(dx)>Math.abs(dy);
      if(!isHorizontal) return;
      e.preventDefault();
      if(dx<-10){ card.style.transform=`translateX(${Math.max(dx,-80)}px)`; }
      else { card.style.transform=''; }
    },{passive:false});
    card.addEventListener('touchend', e=>{
      isDragging=false;
      const dx=e.changedTouches[0].clientX-startX;
      card.style.transform='';
      if(dx<-50) wrap.classList.add('confirm-delete');
    });
  });
}
function cancelDelete(id) { const w=document.getElementById(`sw-${id}`); if(w) w.classList.remove('confirm-delete'); }
function confirmDelete(id) { comics=comics.filter(x=>x.id!==id); saveState();render(); }

// ── ACTIONS ───────────────────────────────────────────────────
function toggleOwned(id){ const c=comics.find(x=>x.id===id); if(c){c.owned=!c.owned;if(!c.owned)c.read=false;saveState();render();} }
function toggleRead(id){  const c=comics.find(x=>x.id===id); if(c){c.read=!c.read;saveState();render();} }

// ── NAV ───────────────────────────────────────────────────────
function setNav(el, view) {
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  if(view==='search_nav') { document.getElementById('search').focus(); }
}

// ── MODAL ─────────────────────────────────────────────────────
let editId=null;
function resetForm(){
  ['f-title','f-volume','f-edition','f-arc','f-order','f-salvat','f-writer','f-artist','f-year'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-lore').value='canon';
  document.getElementById('f-stars').value='4';
  document.getElementById('f-char').value='batman';
  document.getElementById('f-owned').checked=true;
  document.getElementById('f-read').checked=false;
  document.getElementById('ai-feedback').style.display='none';
}
function openAdd(){
  editId=null; resetForm();
  document.getElementById('modal-heading').textContent='Añadir tomo';
  document.getElementById('btn-autocomplete').style.display='flex';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),400);
}
function openEdit(id){
  editId=id; const c=comics.find(x=>x.id===id);
  document.getElementById('modal-heading').textContent='Editar';
  document.getElementById('f-title').value=c.title;
  document.getElementById('f-writer').value=c.writer||'';
  document.getElementById('f-artist').value=c.artist||'';
  document.getElementById('f-year').value=c.year||'';
  document.getElementById('f-volume').value=c.volume||'';
  document.getElementById('f-edition').value=c.edition||'';
  document.getElementById('f-arc').value=c.arc||'';
  document.getElementById('f-order').value=c.order||'';
  document.getElementById('f-lore').value=c.lore||'canon';
  document.getElementById('f-stars').value=c.stars||4;
  document.getElementById('f-salvat').value=c.salvat||'';
  document.getElementById('f-char').value=c.char||'other';
  document.getElementById('f-owned').checked=c.owned;
  document.getElementById('f-read').checked=c.read;
  document.getElementById('ai-feedback').style.display='none';
  document.getElementById('btn-autocomplete').style.display='none';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editId=null; }
function saveComic(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const data={
    title,writer:document.getElementById('f-writer').value.trim(),
    artist:document.getElementById('f-artist').value.trim(),
    year:parseInt(document.getElementById('f-year').value)||null,
    volume:document.getElementById('f-volume').value.trim(),
    edition:document.getElementById('f-edition').value.trim(),
    arc:document.getElementById('f-arc').value.trim(),
    order:parseFloat(document.getElementById('f-order').value)||999,
    lore:document.getElementById('f-lore').value,
    stars:parseInt(document.getElementById('f-stars').value)||3,
    salvat:parseInt(document.getElementById('f-salvat').value)||null,
    char:document.getElementById('f-char').value||'other',
    owned:document.getElementById('f-owned').checked,
    read:document.getElementById('f-read').checked,
  };
  if(editId){ const i=comics.findIndex(x=>x.id===editId); comics[i]={...comics[i],...data}; }
  else comics.push({id:'manual-'+Date.now(),issue:'',...data});
  saveState();closeModal();render();
}

// ── AI AUTOCOMPLETE ───────────────────────────────────────────
async function doAutocomplete(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const btn=document.getElementById('btn-autocomplete'),fb=document.getElementById('ai-feedback'),lbl=document.getElementById('ai-label');
  btn.disabled=true;btn.classList.add('loading');lbl.textContent='…';
  fb.style.display='none';fb.className='ai-feedback';
  const prompt=`Eres un experto en DC Comics. El usuario quiere añadir: "${title}"\n\nERAs: PRE(-99 a 0), 00(Crisis), 01(Orígenes post-Crisis 1-10), 02(Era Clásica 10-25), 03(Liga Moderna 25-45), 04(Cierre 45-60), 05(Flashpoint 60-80), EW(Elseworlds 80+)\n\nResponde SOLO con JSON válido sin markdown:\n{"volume":"","arc":"02 — La Era Clásica","lore":"canon|tiein|elseworlds|origen","stars":1-5,"order":14.5,"char":"batman|jla|flash|crisis|ww|titanes|other","writer":"","artist":"","year":1986,"reason":"breve en español"}`;
  try{
    const res=await fetch(VERCEL_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const info=JSON.parse(data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim());
    if(info.volume) document.getElementById('f-volume').value=info.volume;
    if(info.arc)    document.getElementById('f-arc').value=info.arc;
    if(info.lore)   document.getElementById('f-lore').value=info.lore;
    if(info.stars)  document.getElementById('f-stars').value=String(info.stars);
    if(info.order)  document.getElementById('f-order').value=info.order;
    if(info.char)   document.getElementById('f-char').value=info.char;
    if(info.writer) document.getElementById('f-writer').value=info.writer;
    if(info.artist) document.getElementById('f-artist').value=info.artist;
    if(info.year)   document.getElementById('f-year').value=info.year;
    const em={canon:'🔴',tiein:'🟡',elseworlds:'🟣',origen:'🟢'};
    fb.style.display='block';
    fb.innerHTML=`<strong>${em[info.lore]||'●'} ${(info.lore||'').toUpperCase()}</strong> · Posición ${info.order}<br><span style="opacity:0.75">${info.reason||''}</span>`;
  }catch(e){
    fb.style.display='block';fb.className='ai-feedback error';
    fb.textContent='No se pudo autocompletar. Rellena los campos manualmente.';
  }finally{btn.disabled=false;btn.classList.remove('loading');lbl.textContent='Auto';}
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', openAdd);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveComic);
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

document.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeFilter=btn.dataset.filter; render();
}));
document.querySelectorAll('[data-lore]').forEach(btn=>btn.addEventListener('click',()=>{
  const t=btn.dataset.lore;
  if(activeLore===t){activeLore=null;btn.classList.remove('active');}
  else{document.querySelectorAll('[data-lore]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeLore=t;}
  render();
}));
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value;render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))saveComic();});

loadState().then(()=>render());
</script>
