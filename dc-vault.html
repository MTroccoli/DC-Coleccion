<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DC VAULT — Orden de Lectura</title>

<!-- PWA / App Icon -->
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DC Vault">
<meta name="theme-color" content="#181818">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #181818;
  --surface:  #222222;
  --surface2: #2a2a2a;
  --border:   #333333;
  --border2:  #444444;
  --text:     #e8e8e0;
  --muted:    #888880;
  --dim:      #444440;
  --gold:     #c8a84b;
  --gold2:    #e8c870;
  --red:      #cc3333;
  --yellow:   #c8a020;
  --green:    #2a8a50;
  --purple:   #7030a0;
  --col-batman:   #7755cc;
  --col-flash:    #cc3322;
  --col-crisis:   #4477cc;
  --col-jla:      #2266bb;
  --col-salvat:   #33aa66;
  --col-ww:       #cc6622;
  --col-gl:       #226622;
  --col-titanes:  #aa4488;
  --col-other:    #666660;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HERO */
.hero {
  background: linear-gradient(160deg, #1a1a2e 0%, #181818 60%);
  border-bottom: 2px solid var(--gold);
  padding: 48px 32px 40px;
  position: relative; overflow: hidden;
}
.hero-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 12px;
}
.hero-logo {
  height: 52px; width: auto;
  filter: drop-shadow(0 2px 10px rgba(200,168,75,0.2));
  flex-shrink: 0;
}
.hero-top-right {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.sync-status {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 0.08em;
  color: var(--muted); white-space: nowrap;
}
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 88px); line-height: 0.92; letter-spacing: 0.02em; color: var(--text); }
.hero-title span { color: var(--gold); display: block; }
.hero-sub { font-size: 14px; font-style: italic; color: var(--muted); margin-top: 16px; max-width: 420px; line-height: 1.6; }
.hero-stats { display: flex; gap: 28px; margin-top: 28px; flex-wrap: wrap; }
.hstat { display: flex; flex-direction: column; gap: 2px; }
.hstat-n { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); line-height: 1; }
.hstat-l { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.hero-progress { margin-top: 20px; max-width: 320px; }
.progress-track { height: 2px; background: var(--border2); }
.progress-fill { height: 100%; background: var(--gold); transition: width 0.5s ease; }
.progress-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 5px; }
.hero-actions { position: absolute; top: 24px; right: 24px; display: flex; gap: 8px; }

/* BUTTONS */
.btn { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.1em; padding: 8px 16px; border-radius: 3px; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-gold { background: var(--gold); color: #111; }
.btn-gold:hover { background: var(--gold2); }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--muted); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }

/* LEGEND */
.legend-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
.leg { display: flex; align-items: center; gap: 7px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 0.06em; color: var(--muted); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* FILTERBAR */
.filterbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 32px; display: flex; gap: 12px; align-items: center;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 40;
}
.filter-group {
  display: flex; gap: 5px; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 8px;
}
.filter-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--dim); padding-right: 4px; white-space: nowrap;
}
.filter-divider { width: 1px; height: 28px; background: var(--border2); }
.chip-missing.active { background: #886600; border-color: #bb9900; color: #ffdd66; }
.chip { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 13px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border2); background: none; color: var(--muted); transition: all 0.15s; }
.chip:hover { color: var(--text); border-color: var(--muted); }
.chip.active { background: var(--gold); border-color: var(--gold); color: #111; }
.chip-canon.active      { background: var(--red);    border-color: var(--red);    color: #fff; }
.chip-tiein.active      { background: var(--yellow); border-color: var(--yellow); color: #111; }
.chip-elseworlds.active { background: var(--purple); border-color: var(--purple); color: #fff; }
.chip-origen.active     { background: var(--green);  border-color: var(--green);  color: #fff; }
.fsep { width: 1px; height: 18px; background: var(--border2); margin: 0 2px; }
.search-wrap { margin-left: auto; position: relative; }
.search-wrap::before { content: '⌕'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
.search-wrap input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 6px 10px 6px 28px; border-radius: 2px; font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; width: 160px; transition: all 0.2s; }
.search-wrap input:focus { border-color: var(--gold); width: 220px; }
.search-wrap input::placeholder { color: var(--dim); }

/* MAIN */
main { max-width: 860px; margin: 0 auto; padding: 40px 24px 100px; }

/* ERA BLOCK */
.era-block { margin-bottom: 56px; }
.era-header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.era-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 72px); line-height: 1; color: var(--gold); opacity: 0.7; flex-shrink: 0; min-width: 60px; text-align: right; }
.era-info { padding-top: 6px; }
.era-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(18px, 4vw, 26px); letter-spacing: 0.06em; color: var(--text); text-transform: uppercase; line-height: 1; }
.era-desc { font-size: 13px; font-style: italic; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.era-reset-banner { background: linear-gradient(90deg, #cc333318, transparent); border-left: 3px solid var(--red); border-radius: 0 3px 3px 0; padding: 10px 16px; margin-bottom: 20px; font-size: 12px; color: #cc7777; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }

/* CARD */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.comic-card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; display: flex; align-items: stretch; transition: border-color 0.15s; overflow: hidden; }
.comic-card:hover { border-color: var(--border2); }
.comic-card.is-read { opacity: 0.45; }
.card-strip { width: 4px; flex-shrink: 0; }
.card-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--dim); width: 52px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
.card-body { flex: 1; padding: 12px 14px; min-width: 0; }
.card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
.card-title.crossed { text-decoration: line-through; text-decoration-color: var(--dim); color: var(--muted); }
.char-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
.lore-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
.lore-canon      { background: #cc333322; color: #dd6666; border: 1px solid #cc333344; }
.lore-tiein      { background: #c8a02022; color: #c8a840; border: 1px solid #c8a02044; }
.lore-elseworlds { background: #7030a022; color: #aa66cc; border: 1px solid #7030a044; }
.lore-origen     { background: #2a8a5022; color: #44aa70; border: 1px solid #2a8a5044; }
.salvat-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; background: #c0501018; color: #cc8855; border: 1px solid #c0501030; }
.card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
.card-edition { font-size: 11px; color: var(--dim); }
.card-stars { font-size: 10px; color: var(--gold); letter-spacing: -1px; }
.stars-dim { color: var(--dim); }
.card-desc { font-size: 11px; font-style: italic; color: var(--dim); margin-top: 4px; }
.card-controls { flex-shrink: 0; padding: 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; justify-content: center; border-left: 1px solid var(--border); }
.lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); text-align: center; line-height: 1; }
.dot-owned { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border2); cursor: pointer; transition: all 0.15s; display: block; }
.dot-owned.yes { background: var(--gold); border-color: var(--gold); }
.toggle-read { width: 36px; height: 20px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); cursor: pointer; position: relative; display: block; transition: all 0.2s; }
.toggle-read::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--dim); transition: all 0.2s; }
.toggle-read.yes { background: #2a8a5030; border-color: var(--green); }
.toggle-read.yes::after { left: 18px; background: var(--green); }
.card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.comic-card:hover .card-actions { opacity: 1; }
.icon-btn { background: none; border: 1px solid var(--border); color: var(--dim); width: 24px; height: 24px; border-radius: 2px; cursor: pointer; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-btn:hover { color: var(--red); border-color: var(--red); }
.icon-btn.edit:hover { color: var(--gold); border-color: var(--gold); }

/* ACCORDION */
.era-block { margin-bottom: 16px; }
.era-toggle {
  display: flex; align-items: flex-start; gap: 24px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
  transition: opacity 0.15s;
}
.era-toggle:hover { opacity: 0.85; }
.era-chevron {
  font-size: 18px; color: var(--gold); opacity: 0.6;
  margin-left: auto; padding-top: 8px; flex-shrink: 0;
  transition: transform 0.25s;
}
.era-block.collapsed .era-chevron { transform: rotate(-90deg); }
.era-body {
  overflow: hidden;
  max-height: 9999px;
  transition: max-height 0.3s ease;
}
.era-block.collapsed .era-body { max-height: 0; }

/* SWIPE TO DELETE */
.swipe-wrap {
  position: relative; overflow: hidden; border-radius: 3px;
}
.delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 80px; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}
.swipe-wrap.swiping .delete-bg { opacity: 1; }
.comic-card {
  transition: transform 0.2s ease, border-color 0.15s;
  touch-action: pan-y;
}
.swipe-wrap.confirm-delete .comic-card {
  background: #cc333322;
  border-color: var(--red);
}

/* DELETE CONFIRM BAR */
.delete-confirm {
  display: none; align-items: center; justify-content: space-between;
  background: var(--red); padding: 10px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; letter-spacing: 0.06em; color: #fff;
}
.swipe-wrap.confirm-delete .delete-confirm { display: flex; }
.swipe-wrap.confirm-delete .comic-card { pointer-events: none; }
.btn-confirm-del {
  background: #fff; color: var(--red); border: none;
  padding: 5px 14px; border-radius: 2px;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px;
  cursor: pointer; letter-spacing: 0.08em;
}
.btn-cancel-del {
  background: none; border: 1px solid #ffffff66; color: #fff;
  padding: 5px 14px; border-radius: 2px;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px;
  cursor: pointer; letter-spacing: 0.08em;
} text-align: center; padding: 80px 0; }
.empty-big { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: var(--dim); }
.empty-sub { font-size: 14px; color: var(--muted); margin-top: 8px; }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: #222; border: 1px solid var(--border2); border-top: 3px solid var(--gold); border-radius: 3px; width: min(520px, 100%); padding: 24px 24px 20px; position: relative; animation: fadeUp 0.18s ease; max-height: 92vh; overflow-y: auto; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; margin-bottom: 16px; color: var(--gold); }
.modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
.modal-close:hover { color: var(--text); }
.ai-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 14px; }
.btn-ai { flex-shrink: 0; background: #1a1a2e; color: var(--gold); border: 1px solid #3344aa; padding: 9px 12px; border-radius: 2px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-ai:hover { border-color: var(--gold); }
.btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ai.loading #ai-icon { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.ai-feedback { background: #1a1a2e; border: 1px solid #3344aa; border-radius: 2px; padding: 10px 12px; margin-bottom: 12px; font-size: 12px; color: #8899dd; line-height: 1.5; }
.ai-feedback.error { background: #2a1010; border-color: #553333; color: #cc6666; }
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fg-full { grid-column: 1/-1; }
.fl { display: flex; flex-direction: column; gap: 4px; }
.fl label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); }
.fl input, .fl select { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: 2px; font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
.fl input:focus, .fl select:focus { border-color: var(--gold); }
.fl select option { background: #222; }
.checkrow { display: flex; gap: 20px; margin-top: 4px; }
.chk { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); cursor: pointer; }
.chk input { accent-color: var(--gold); width: 14px; height: 14px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-cancel { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 8px 16px; border-radius: 2px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { color: var(--text); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

@media (max-width: 500px) {
  .hero { padding: 32px 20px 28px; }
  .hero-actions { position: static; margin-bottom: 12px; }
  main { padding: 24px 16px 80px; }
  .filterbar, .legend-bar { padding-left: 16px; padding-right: 16px; }
  .card-num { width: 40px; font-size: 22px; }
  .card-actions { display: none; }
  .fg { grid-template-columns: 1fr; }
  .fg-full { grid-column: 1; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <img src="icon.png" alt="DC Vault" class="hero-logo">
    <div class="hero-top-right">
      <span id="sync-status" class="sync-status">☁ —</span>
      <button class="btn btn-gold" id="btn-add">＋ Añadir tomo</button>
    </div>
  </div>
  <div class="hero-sub">Desde Crisis en Tierras Infinitas hasta el New 52 — incluyendo eventos mayores y arcos esenciales del lore.</div>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n" id="s-total">0</div><div class="hstat-l">Tomos</div></div>
    <div class="hstat"><div class="hstat-n" id="s-owned">0</div><div class="hstat-l">Tengo</div></div>
    <div class="hstat"><div class="hstat-n" id="s-read">0</div><div class="hstat-l">Leídos</div></div>
    <div class="hstat"><div class="hstat-n" id="s-pct">0%</div><div class="hstat-l">Progreso</div></div>
  </div>
  <div class="hero-progress">
    <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 de 0 leídos</div>
  </div>
</div>

<div class="legend-bar">
  <div class="leg"><div class="leg-dot" style="background:var(--col-batman)"></div>Batman</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-flash)"></div>Flash</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-crisis)"></div>Crisis / Evento</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-jla)"></div>JLA / Superman</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-ww)"></div>Wonder Woman</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-titanes)"></div>Titanes</div>
  <div class="leg"><div class="leg-dot" style="background:var(--col-salvat)"></div>Colección Salvat</div>
</div>

<div class="filterbar">
  <div class="filter-group">
    <span class="filter-label">Colección</span>
    <button class="chip active" data-filter="all">Todos</button>
    <button class="chip" data-filter="owned">Tengo</button>
    <button class="chip chip-missing" data-filter="missing">No tengo</button>
    <button class="chip" data-filter="unread">Sin leer</button>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Lore</span>
    <button class="chip chip-canon" data-lore="canon">Canon</button>
    <button class="chip chip-tiein" data-lore="tiein">Tie-in</button>
    <button class="chip chip-elseworlds" data-lore="elseworlds">Elseworlds</button>
    <button class="chip chip-origen" data-lore="origen">Origen</button>
  </div>
  <div class="search-wrap"><input type="text" id="search" placeholder="Buscar…"></div>
</div>

<main><div id="root"></div></main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-title" id="modal-heading">Añadir tomo</div>
    <div class="ai-row">
      <div class="fl" style="flex:1">
        <label>Título del cómic</label>
        <input id="f-title" type="text" placeholder="Ej: Batman: Noel" autocomplete="off">
      </div>
      <button class="btn-ai" id="btn-autocomplete" onclick="doAutocomplete()">
        <span id="ai-icon">✦</span><span id="ai-label">Autocompletar</span>
      </button>
    </div>
    <div id="ai-feedback" class="ai-feedback" style="display:none"></div>
    <div class="fg">
      <div class="fl"><label>Guionista</label><input id="f-writer" type="text" placeholder="Frank Miller, Geoff Johns…"></div>

// ── SYNC STATUS ────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if(!el) return;
  const icons  = { idle:'☁', saving:'↑', ok:'✓', error:'✕', loading:'↓' };
  const colors = { idle:'var(--muted)', saving:'var(--gold)', ok:'var(--green)', error:'var(--red)', loading:'var(--gold)' };
  el.textContent = `${icons[state]} ${msg}`;
  el.style.color = colors[state];
  el.style.animation = (state==='saving'||state==='loading') ? 'pulse 1s infinite' : 'none';
}

// ── LOAD ───────────────────────────────────────────────────────
async function loadState() {
  setSyncStatus('loading', 'Cargando…');
  try {
    const res = await fetch(SB.endpoint, { headers: SB.headers });
    if(!res.ok) throw new Error(`Supabase ${res.status}`);
    const rows = await res.json();

    if(rows.length > 0 && rows[0].data && rows[0].data.length > 0) {
      comics = rows[0].data;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(comics));
      setSyncStatus('ok', 'Sincronizado');
    } else {
      comics = buildDefault();
      await syncToSupabase(true); // force=true para ignorar modalOpen
    }
  } catch(e) {
    console.warn('Supabase no disponible, usando localStorage:', e);
    const raw = localStorage.getItem(LOCAL_KEY);
    comics = raw ? JSON.parse(raw) : buildDefault();
    setSyncStatus('error', 'Sin conexión — local');
  }
}

// ── SAVE ───────────────────────────────────────────────────────
let saveTimer = null;
let modalOpen = false; // flag para no sincronizar mientras el modal está abierto

function saveState() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(comics));
  clearTimeout(saveTimer);
  setSyncStatus('saving', 'Guardando…');
  saveTimer = setTimeout(syncToSupabase, 1500);
}

async function insertToSupabase() {
  try {
    const res = await fetch(`${SB.url}/rest/v1/${SB.table}`, {
      method: 'POST',
      headers: SB.headers,
      body: JSON.stringify({ id: SB.rowId, data: comics })
    });
    if(!res.ok) throw new Error(`Insert ${res.status}`);
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    setSyncStatus('error', 'Error al guardar');
    console.error('Supabase insert error:', e);
  }
}

async function syncToSupabase(force=false) {
  if(modalOpen && !force) return; // no sincronizar mientras el usuario edita
  try {
    const res = await fetch(`${SB.url}/rest/v1/${SB.table}`, {
      method: 'POST',
      headers: { ...SB.headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: SB.rowId, data: comics })
    });
    if(!res.ok) throw new Error(`Upsert ${res.status}`);
    setSyncStatus('ok', 'Sincronizado ✓');
  } catch(e) {
    setSyncStatus('error', 'Error al sincronizar');
    console.error('Supabase sync error:', e);
  }
}

// ── FILTERS ────────────────────────────────────────────────────
let activeFilter='all', activeLore=null, searchQ='';
function getVisible() {
  let list = [...comics];
  if(activeFilter==='owned')   list = list.filter(c=>c.owned);
  if(activeFilter==='missing') list = list.filter(c=>!c.owned);
  if(activeFilter==='unread')  list = list.filter(c=>c.owned&&!c.read);
  if(activeLore)               list = list.filter(c=>c.lore===activeLore);
  if(searchQ){ const q=searchQ.toLowerCase(); list=list.filter(c=>c.title.toLowerCase().includes(q)||(c.arc||'').toLowerCase().includes(q)); }
  return list.sort((a,b)=>a.order-b.order);
}

function render() {
  updateStats();

  if(!list.length){ root.innerHTML=`<div class="empty"><div class="empty-big">—</div><div class="empty-sub">Sin resultados.</div></div>`; return; }

  const collapsed = {};
  document.querySelectorAll('.era-block.collapsed').forEach(el => {
    collapsed[el.dataset.era] = true;
  });

  const buckets = {};
  ERAS.forEach(e=>{ buckets[e.key]=[]; });
  list.forEach(c => {
    const era = ERAS.find(e=>c.order>=e.oMin&&c.order<e.oMax)||ERAS[ERAS.length-1];
    buckets[era.key].push(c);
  });

  let html='', pos=1;
  ERAS.forEach(era => {
    const items = buckets[era.key];
    if(!items.length) return;
    const isCollapsed = collapsed[era.key] !== false ? 'collapsed' : '';
    const chevron = '›';

    html += `<div class="era-block ${isCollapsed}" data-era="${era.key}">
      <div class="era-toggle" onclick="toggleEra('${era.key}')">
        <div class="era-num">${era.num}</div>
        <div class="era-info">
          <div class="era-name">${era.name} <span style="color:var(--muted);font-size:13px;font-family:'Barlow',sans-serif;font-weight:300">(${items.length})</span></div>
          <div class="era-desc">${era.desc}</div>
        </div>
        <div class="era-chevron">›</div>
      </div>
      <div class="era-body">
        ${era.reset?`<div class="era-reset-banner">${era.reset}</div>`:''}
        <div class="card-list" style="padding-top:8px">`;

    items.forEach(c => {
      const color = CHAR_COLORS[c.char||'other']||'var(--col-other)';
      html += `
        <div class="swipe-wrap" data-id="${c.id}" id="sw-${c.id}">
          <div class="delete-bg">🗑</div>
          <div class="comic-card ${c.read?'is-read':''}" data-id="${c.id}">
            <div class="card-strip" style="background:${color}"></div>
            <div class="card-num">${pos++}</div>
            <div class="card-body">
              <div class="card-title-row">
                <span class="card-title ${c.read?'crossed':''}">${c.title}</span>
                <span class="char-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${CHAR_LABELS[c.char||'other']||'Otro'}</span>
                <span class="lore-tag lore-${c.lore}">${LORE_LABELS[c.lore]}</span>
                ${c.salvat?`<span class="salvat-badge">Salvat #${c.salvat}</span>`:''}
              </div>
              <div class="card-meta">
                ${c.edition?`<span class="card-edition">${c.edition}</span>`:''}
                ${c.volume?`<span class="card-edition">· ${c.volume}</span>`:''}
                ${c.year?`<span class="card-edition">· ${c.year}</span>`:''}
                ${starsHtml(c.stars)}
              </div>
              ${(c.writer||c.artist)?`<div class="card-desc">${[c.writer?`✍ ${c.writer}`:'', c.artist?`✏ ${c.artist}`:''].filter(Boolean).join(' · ')}</div>`:''}
              ${c.issue?`<div class="card-desc">${c.issue}</div>`:''}
            </div>
            <div class="card-controls">
              <div class="lbl">Tengo</div>
              <span class="dot-owned ${c.owned?'yes':''}" onclick="toggleOwned('${c.id}')"></span>
              <div class="lbl">Leído</div>
              <span class="toggle-read ${c.read?'yes':''}" onclick="toggleRead('${c.id}')"></span>
              <div class="card-actions">
                <button class="icon-btn edit" onclick="openEdit('${c.id}')">✏</button>
              </div>
            </div>
          </div>
          <div class="delete-confirm">
            <span>¿Eliminar este tomo?</span>
            <div style="display:flex;gap:8px">
              <button class="btn-cancel-del" onclick="cancelDelete('${c.id}')">Cancelar</button>
              <button class="btn-confirm-del" onclick="confirmDelete('${c.id}')">Eliminar</button>
            </div>
          </div>
        </div>`;
    });
    html += `</div></div></div>`;
  });
  root.innerHTML = html;
  initSwipe();
}

function updateStats() {
  const owned=comics.filter(c=>c.owned).length, read=comics.filter(c=>c.read).length;
  document.getElementById('s-total').textContent=comics.length;
  document.getElementById('s-owned').textContent=owned;
  document.getElementById('s-read').textContent=read;
  const pct=owned?Math.round(read/owned*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${read} de ${owned} leídos`;
}

// ── ACCORDION ─────────────────────────────────────────────────
function toggleEra(key) {
  const el = document.querySelector(`.era-block[data-era="${key}"]`);
  if(el) el.classList.toggle('collapsed');
}

// ── SWIPE TO DELETE ────────────────────────────────────────────
function initSwipe() {
  document.querySelectorAll('.swipe-wrap').forEach(wrap => {
    const card = wrap.querySelector('.comic-card');
    let startX=0, startY=0, isDragging=false, isHorizontal=null;

    card.addEventListener('touchstart', e=>{
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      isDragging=true; isHorizontal=null;
    }, {passive:true});

    card.addEventListener('touchmove', e=>{
      if(!isDragging) return;
      const dx=e.touches[0].clientX-startX;
      const dy=e.touches[0].clientY-startY;
      if(isHorizontal===null) isHorizontal=Math.abs(dx)>Math.abs(dy);
      if(!isHorizontal) return;
      e.preventDefault();
      if(dx<-10){
        card.style.transform=`translateX(${Math.max(dx,-90)}px)`;
        wrap.classList.add('swiping');
      } else {
        card.style.transform='';
        wrap.classList.remove('swiping');
      }
    }, {passive:false});

    card.addEventListener('touchend', e=>{
      isDragging=false;
      const dx=e.changedTouches[0].clientX-startX;
      card.style.transform='';
      wrap.classList.remove('swiping');
      if(dx<-60) wrap.classList.add('confirm-delete');
    });
  });
}

function cancelDelete(id) {
  const wrap=document.getElementById(`sw-${id}`);
  if(wrap) wrap.classList.remove('confirm-delete');
}
function confirmDelete(id) {
  comics=comics.filter(x=>x.id!==id);
  saveState(); render();
}

// ── ACTIONS ───────────────────────────────────────────────────
function toggleOwned(id){ const c=comics.find(x=>x.id===id); if(c){c.owned=!c.owned;if(!c.owned)c.read=false;saveState();render();} }
function toggleRead(id){  const c=comics.find(x=>x.id===id); if(c){c.read=!c.read;saveState();render();} }
function deleteComic(id){ confirmDelete(id); }

// ── MODAL ─────────────────────────────────────────────────────
let editId=null;

function resetForm(){
  ['f-title','f-volume','f-edition','f-arc','f-order','f-salvat','f-writer','f-artist','f-year'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-lore').value='canon';
  document.getElementById('f-stars').value='4';
  document.getElementById('f-char').value='batman';
  document.getElementById('f-owned').checked=true;
  document.getElementById('f-read').checked=false;
  document.getElementById('ai-feedback').style.display='none';
}
function openAdd(){
  editId=null; resetForm(); modalOpen=true;
  document.getElementById('modal-heading').textContent='Añadir tomo';
  document.getElementById('btn-autocomplete').style.display='flex';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function openEdit(id){
  editId=id; modalOpen=true;
  const c=comics.find(x=>x.id===id);
  document.getElementById('modal-heading').textContent='Editar tomo';
  document.getElementById('f-title').value=c.title;
  document.getElementById('f-writer').value=c.writer||'';
  document.getElementById('f-artist').value=c.artist||'';
  document.getElementById('f-year').value=c.year||'';
  document.getElementById('f-volume').value=c.volume||'';
  document.getElementById('f-edition').value=c.edition||'';
  document.getElementById('f-arc').value=c.arc||'';
  document.getElementById('f-order').value=c.order||'';
  document.getElementById('f-lore').value=c.lore||'canon';
  document.getElementById('f-stars').value=c.stars||4;
  document.getElementById('f-salvat').value=c.salvat||'';
  document.getElementById('f-char').value=c.char||'other';
  document.getElementById('f-owned').checked=c.owned;
  document.getElementById('f-read').checked=c.read;
  document.getElementById('ai-feedback').style.display='none';
  document.getElementById('btn-autocomplete').style.display='none';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  editId=null; modalOpen=false;
}
function saveComic(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const data={
    title,
    writer:document.getElementById('f-writer').value.trim(),
    artist:document.getElementById('f-artist').value.trim(),
    year:parseInt(document.getElementById('f-year').value)||null,
    volume:document.getElementById('f-volume').value.trim(),
    edition:document.getElementById('f-edition').value.trim(),
    arc:document.getElementById('f-arc').value.trim(),
    order:parseFloat(document.getElementById('f-order').value)||999,
    lore:document.getElementById('f-lore').value,
    stars:parseInt(document.getElementById('f-stars').value)||3,
    salvat:parseInt(document.getElementById('f-salvat').value)||null,
    char:document.getElementById('f-char').value||'other',
    owned:document.getElementById('f-owned').checked,
    read:document.getElementById('f-read').checked,
  };
  if(editId){ const i=comics.findIndex(x=>x.id===editId); comics[i]={...comics[i],...data}; }
  else comics.push({id:'manual-'+Date.now(),issue:'',...data});
  saveState();closeModal();render();
}

// ── AI AUTOCOMPLETE ───────────────────────────────────────────
async function doAutocomplete(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const btn=document.getElementById('btn-autocomplete'),fb=document.getElementById('ai-feedback'),lbl=document.getElementById('ai-label');
  btn.disabled=true;btn.classList.add('loading');lbl.textContent='Buscando…';
  fb.style.display='none';fb.className='ai-feedback';

  const prompt=`Eres un experto en DC Comics. El usuario quiere añadir: "${title}"

Usa estas eras para ubicarlo en la línea de tiempo de lectura recomendada:
- ERA PRE (order -99 a 0): Era Pre-Crisis, Edad de Plata y Bronce (ej: Juicio de Barry Allen, GL/GA Héroes Errantes en su versión original)
- ERA 00 (order 0-1): Crisis en Tierras Infinitas (reseteo del universo)
- ERA 01 (order 1-10): Orígenes post-Crisis (Batman Año Uno, Superman, WW, JLA Año Uno)
- ERA 02 (order 10-25): Era Clásica 80s-90s (Muerte de Superman, Knightfall, Largo Halloween)
- ERA 03 (order 25-45): Liga Moderna 2000s (Morrison JLA, Silencio, crossovers)
- ERA 04 (order 45-60): Cierre de era pre-New52 (Flash Renacimiento, Batman e Hijo)
- ERA 05 (order 60-80): Flashpoint (segundo reseteo, abre el New 52)
- ELSEWORLDS (order 80+): Historias alternativas (Dark Knight Returns, etc.)

Responde SOLO con JSON válido sin markdown:
{"title":"título exacto y completo del tomo en español si existe, sino en inglés","volume":"issues o vol","arc":"nombre de era exacto ej: 02 — La Era Clásica","lore":"canon|tiein|elseworlds|origen","stars":1-5,"order":número decimal en rango correcto,"char":"batman|jla|flash|crisis|ww|titanes|other","writer":"guionista principal","artist":"dibujante principal","year":año de publicación original como número,"reason":"explicación breve en español"}`;

  try{
    const res=await fetch(VERCEL_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const info=JSON.parse(data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim());
    if(info.title)  document.getElementById('f-title').value=info.title;
    if(info.volume) document.getElementById('f-volume').value=info.volume;
    if(info.arc)    document.getElementById('f-arc').value=info.arc;
    if(info.lore)   document.getElementById('f-lore').value=info.lore;
    if(info.stars)  document.getElementById('f-stars').value=String(info.stars);
    if(info.order)  document.getElementById('f-order').value=info.order;
    if(info.char)   document.getElementById('f-char').value=info.char;
    if(info.writer) document.getElementById('f-writer').value=info.writer;
    if(info.artist) document.getElementById('f-artist').value=info.artist;
    if(info.year)   document.getElementById('f-year').value=info.year;
    const em={canon:'🔴',tiein:'🟡',elseworlds:'🟣',origen:'🟢'};
    fb.style.display='block';
    fb.innerHTML=`<strong style="color:var(--text);font-size:13px">${info.title||''}</strong><br><strong>${em[info.lore]||'●'} ${(info.lore||'').toUpperCase()}</strong> · Posición ${info.order} · ${info.year||''}<br><span style="opacity:0.75">${info.reason||''}</span>`;
  }catch(e){
    fb.style.display='block';fb.className='ai-feedback error';
    fb.textContent='No se pudo autocompletar. Rellena los campos manualmente.';
  }finally{btn.disabled=false;btn.classList.remove('loading');lbl.textContent='Autocompletar';}
}

// ── EVENTS ───────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click',openAdd);
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-save').addEventListener('click',saveComic);
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeFilter=btn.dataset.filter;render();}));
document.querySelectorAll('[data-lore]').forEach(btn=>btn.addEventListener('click',()=>{const t=btn.dataset.lore;if(activeLore===t){activeLore=null;btn.classList.remove('active');}else{document.querySelectorAll('[data-lore]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeLore=t;}render();}));
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value;render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))saveComic();});

loadState().then(()=>render());
</script>
